name: Publish to npm

# Publishes to npm when you cut a GitHub Release. No token required — this uses
# npm trusted publishing (OIDC). One-time setup on npm is documented in RELEASING.md.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; Node 20/22 bundle npm 10.x.
      - name: Upgrade npm (OIDC support)
        run: npm install -g npm@latest

      # Guard: the release tag (vX.Y.Z) must match package.json's version, or
      # npm would try to publish the wrong/existing version and fail confusingly.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "release tag: $TAG · package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version, commit, then re-tag."
            exit 1
          fi

      - run: npm ci

      # prepublishOnly (typecheck + build + test) runs automatically inside
      # `npm publish` and aborts the release if anything fails.
      - name: Publish
        run: npm publish --provenance --access public
