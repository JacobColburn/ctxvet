name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck
      # Build first: the CLI tests and the dogfood step both run the built binary.
      - run: npm run build
      - run: npm test
      # Dogfood gate: this repo must pass its own linter.
      - run: node dist/cli.js .
