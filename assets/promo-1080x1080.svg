<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <rect width="1080" height="1080" fill="#0d1117"/>
  <text x="80" y="120" fill="#e6edf3" font-size="64" font-weight="bold">ctxvet</text>
  <text x="80" y="175" fill="#7c8b9d" font-size="30">lint your agent context files</text>
  <text x="80" y="215" fill="#7c8b9d" font-size="30">against your actual repo</text>

  <!-- terminal window -->
  <rect x="80" y="270" width="920" height="600" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <circle cx="120" cy="306" r="9" fill="#ff5f57"/>
  <circle cx="150" cy="306" r="9" fill="#febc2e"/>
  <circle cx="180" cy="306" r="9" fill="#28c840"/>

  <text x="112" y="370" fill="#3fb950" font-size="26">$ npx ctxvet</text>

  <text x="112" y="430" fill="#e6edf3" font-size="25" font-weight="bold" text-decoration="underline">CLAUDE.md</text>
  <text x="112" y="475" fill="#8b949e" font-size="23">CLAUDE.md:42</text>
  <text x="310" y="475" fill="#d29922" font-size="23">warn</text>
  <text x="400" y="475" fill="#8b949e" font-size="23">repo/dead-path</text>
  <text x="112" y="510" fill="#e6edf3" font-size="23">  'src/utils/legacy.ts' does not exist in this repo</text>

  <text x="112" y="560" fill="#8b949e" font-size="23">CLAUDE.md:17</text>
  <text x="310" y="560" fill="#d29922" font-size="23">warn</text>
  <text x="400" y="560" fill="#8b949e" font-size="23">repo/dead-script</text>
  <text x="112" y="595" fill="#e6edf3" font-size="23">  'npm run typecheck' — no such script exists</text>

  <text x="112" y="645" fill="#8b949e" font-size="23">CLAUDE.md:88</text>
  <text x="310" y="645" fill="#d29922" font-size="23">warn</text>
  <text x="400" y="645" fill="#8b949e" font-size="23">dup/cross-file</text>
  <text x="112" y="680" fill="#e6edf3" font-size="23">  duplicates AGENTS.md:31 (~120 tokens, paid twice)</text>

  <text x="112" y="750" fill="#e6edf3" font-size="23">3 files scanned · <tspan fill="#3fb950">0 errors</tspan> · <tspan fill="#d29922">3 warnings</tspan></text>
  <text x="112" y="790" fill="#8b949e" font-size="23">est. 4.1k tokens of context (~2.9k in duplicates)</text>

  <text x="80" y="940" fill="#e6edf3" font-size="30">Your CLAUDE.md is loaded every turn.</text>
  <text x="80" y="985" fill="#7c8b9d" font-size="30">When it rots, your agent follows fiction.</text>
  <text x="80" y="1040" fill="#3fb950" font-size="26">deterministic · no LLM calls · MIT · npx ctxvet</text>
</svg>
