<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c8b9d"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#0d1117"/>
  <text x="40" y="52" fill="#e6edf3" font-size="26" font-weight="bold">ctxvet — how it works</text>
  <text x="40" y="78" fill="#7c8b9d" font-size="14">deterministic · no LLM calls · no network · the repo is the ground truth</text>

  <!-- context files -->
  <rect x="40" y="110" width="250" height="150" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="140" fill="#79c0ff" font-size="15" font-weight="bold">context files</text>
  <text x="60" y="168" fill="#e6edf3" font-size="14">CLAUDE.md</text>
  <text x="60" y="190" fill="#e6edf3" font-size="14">AGENTS.md · GEMINI.md</text>
  <text x="60" y="212" fill="#e6edf3" font-size="14">.cursor/rules/*.mdc</text>
  <text x="60" y="234" fill="#e6edf3" font-size="14">SKILL.md · .windsurfrules</text>

  <!-- repo ground truth -->
  <rect x="40" y="300" width="250" height="150" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="330" fill="#d2a8ff" font-size="15" font-weight="bold">repo ground truth</text>
  <text x="60" y="358" fill="#e6edf3" font-size="14">file-tree snapshot</text>
  <text x="60" y="380" fill="#e6edf3" font-size="14">package.json scripts</text>
  <text x="60" y="402" fill="#e6edf3" font-size="14">Makefile targets</text>
  <text x="60" y="424" fill="#e6edf3" font-size="14">.gitignore awareness</text>

  <!-- rules -->
  <rect x="380" y="150" width="260" height="260" rx="10" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="400" y="182" fill="#3fb950" font-size="15" font-weight="bold">9 deterministic rules</text>
  <text x="400" y="212" fill="#e6edf3" font-size="13.5">repo/dead-path</text>
  <text x="400" y="233" fill="#e6edf3" font-size="13.5">repo/dead-script</text>
  <text x="400" y="254" fill="#e6edf3" font-size="13.5">repo/orphan-rule-file</text>
  <text x="400" y="275" fill="#e6edf3" font-size="13.5">size/bloat · dup/cross-file</text>
  <text x="400" y="296" fill="#e6edf3" font-size="13.5">style/vague-instruction</text>
  <text x="400" y="317" fill="#e6edf3" font-size="13.5">skill/frontmatter</text>
  <text x="400" y="338" fill="#e6edf3" font-size="13.5">skill/description-quality</text>
  <text x="400" y="359" fill="#e6edf3" font-size="13.5">secret/leak</text>
  <text x="400" y="392" fill="#7c8b9d" font-size="12">each rule cites its evidence</text>

  <!-- report -->
  <rect x="710" y="150" width="230" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="730" y="182" fill="#ffa657" font-size="15" font-weight="bold">terminal report</text>
  <text x="730" y="210" fill="#e6edf3" font-size="13.5">path:line · severity</text>
  <text x="730" y="231" fill="#e6edf3" font-size="13.5">token-cost summary</text>
  <text x="730" y="252" fill="#e6edf3" font-size="13.5">suppressions</text>

  <rect x="710" y="300" width="230" height="110" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="730" y="332" fill="#ffa657" font-size="15" font-weight="bold">CI / tooling</text>
  <text x="730" y="360" fill="#e6edf3" font-size="13.5">--format json · exit codes</text>
  <text x="730" y="381" fill="#e6edf3" font-size="13.5">--max-warnings gating</text>

  <!-- arrows -->
  <line x1="290" y1="185" x2="372" y2="230" stroke="#7c8b9d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="290" y1="375" x2="372" y2="330" stroke="#7c8b9d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="230" x2="702" y2="205" stroke="#7c8b9d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="330" x2="702" y2="355" stroke="#7c8b9d" stroke-width="2" marker-end="url(#arr)"/>

  <text x="40" y="496" fill="#7c8b9d" font-size="13">npx ctxvet · MIT · github.com/JacobColburn/ctxvet</text>
</svg>
